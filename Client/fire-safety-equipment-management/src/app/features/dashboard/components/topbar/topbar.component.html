<header class="topbar">
  <button aria-label="Menü" class="icon-button">
    <app-icon name="menu"/>
  </button>
  <label class="search">
    <app-icon name="search"/>
    <input placeholder="Keresés eszközre, telephelyre, ügyfélre..."/>
    <kbd>⌘ K</kbd>
  </label>
  <div class="topbar-actions">
    <button aria-label="Értesítések" class="icon-button has-alert">
      <app-icon name="bell"/>
    </button>
    <button aria-label="Üzenetek" class="icon-button has-alert">
      <app-icon name="mail"/>
    </button>
    <span class="avatar muted">VK</span>
    <span class="account">
      <strong>Védelmező Kft.</strong>
      <small>Ügyfél</small>
    </span>
    <button aria-label="Fiók menü" class="plain-button">⌄</button>
  </div>
</header>
